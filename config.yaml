# ── Frequency Resonance Pipeline Configuration ──────────────────────────────
# All paths are relative to the project root (where this file lives),
# unless they are absolute.  Override any value via CLI flags.

# ── I/O ─────────────────────────────────────────────────────────────────────
mode: directory            # "directory" or "file_list"
data_dir: /media/data/Workspace/Data/62EI/RAW_DATA
output_dir: output
file_list_path: null       # only used when mode == file_list

# ── Data loading (OUCRU SmartCare CSV) ──────────────────────────────────────
data_format: OUCRU_CSV
signal_type: auto          # "auto" | "PPG" | "ECG" — auto detects from filename
signal_column: pleth       # PPG column to extract: pleth | ir | red
ecg_signal_column: ecg     # ECG column to extract (used when signal_type is ECG or auto-detected)

# ── Signal processing ──────────────────────────────────────────────────────
sampling_rate: 100         # Hz
segment_duration: 300      # seconds (5 min)
step_size: 300             # seconds (5 min)
lowcut: 0.5                # bandpass low  (Hz)
highcut: 20.0              # bandpass high (Hz)
nperseg: 1024              # FFT segment length

# ── SQI (Signal Quality Index) ──────────────────────────────────────────────
# threshold_method: "value" (legacy per-metric cutoff) or "composite"
#   (statistical scoring across all metrics — quantile, z-score, tail area,
#    trapezoidal integration, rolling variance).
# The "primary_sqi" is only used in "value" mode.
threshold_method: composite     # "value" | "composite"
primary_sqi: signal_entropy_sqi

# ── Composite threshold config (used when threshold_method == composite) ────
composite:
  min_quantile: 10              # flag if quantile rank < 10th percentile
  max_tail_area: 0.05           # flag if tail probability > 5%
  max_modified_z: 3.0           # flag if |modified z-score| > 3
  min_trapz_ratio: 0.3          # flag if trapezoidal-area ratio < 0.3
  max_rolling_var: 2.0          # flag if local SQI variance > 2
  weights: [0.25, 0.20, 0.20, 0.20, 0.15]   # quantile, tail, z, trapz, var
  score_threshold: 0.5          # abnormal if composite score < this

# ── Per-metric SQI config ──────────────────────────────────────────────────
# "enabled" controls whether the metric is computed (both modes).
# "threshold" / "threshold_type" are only used in "value" mode.
sqi:
  signal_entropy_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  snr_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  kurtosis_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  skewness_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  zero_crossing_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  energy_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  amplitude_variability_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  baseline_wander_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  peak_to_peak_amplitude_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  ppg_signal_quality_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

  respiratory_signal_quality_sqi:
    enabled: true
    threshold: -2
    threshold_type: below

# ── Peak detection ──────────────────────────────────────────────────────────
peak_height_percentile: 95
peak_distance: 5

# ── Feature extraction ──────────────────────────────────────────────────────
# HRV + morphology extraction is CPU-heavy (~2 min / segment).
# Set to false to only produce SQI + RR outputs quickly.
extract_features: false

# ── Processing ──────────────────────────────────────────────────────────────
max_workers: 4
batch_size: 100

# ── Harmonic / resonance frequencies ────────────────────────────────────────
harmonic_frequencies:
  Mg: [4.0]
  Ca: [6.0]
  Fe: [12.0]
  Zn: [18.0]

# ── Reports ─────────────────────────────────────────────────────────────────
reports:
  report_dir: output/reports
  event_dir: null            # path to event data, if any

